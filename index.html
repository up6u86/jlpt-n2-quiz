<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N2 每日刷題計畫</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 自訂淡入與縮放動畫 (Tailwind-animate 的簡易替代) */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInTop { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInBottom { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-in.fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-in.slide-in-from-top-2 { animation: slideInTop 0.3s ease-out forwards; }
    .animate-in.slide-in-from-bottom-4 { animation: slideInBottom 0.5s ease-out forwards; }
    .animate-in.zoom-in-95 { animation: zoomIn 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-[#F5F5DC]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // --- 內建圖示 (SVG Components 替代 Lucide-react) ---
    const Icons = {
      ChevronLeft: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>,
      ChevronRight: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>,
      CheckCircle2: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
      XCircle: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>,
      BookOpen: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      AlertTriangle: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>,
      RotateCcw: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
      Trophy: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 1.1-.9 2-2 2H4"/><path d="M14 14.66V17c0 1.1.9 2 2 2h4"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    };

    // --- 初始範例資料 ---
    // 註：為了確保編譯順利不再被截斷，這裡僅放入您最初提供的 4 題範例。
    // 請在本地端運行時，將剩餘的 500 題依照相同格式直接貼在此字串內即可。
    const rawCSVData = `id,week,day,type,question,opt1,opt2,opt3,opt4,answer,translation,explanation
1,1,1,もじ,A国の大統領は、日本の印象を次のように述べた。,もべた,ぬべた,のべた,むべた,3,A國總統對日本的印象進行了如下敘述。,"【解答：3】【領】リョウ：大統領 總統・領事館 領事館・領収書 收據 【印】イン：印象 印象・印刷 印刷 【しるし】印 記號・目印 記號、目標 【述】ジュツ：述語 述語(語學用語) の(〜べる)：述べる 敘述"
2,1,1,ごい,電子レンジは、50年前は珍しかったが、今ではどこの家にもある＿＿＿＿電化製品です。,ありふれた,おだやかな,なつかしい,ふさわしい,1,微波爐在50年前是很稀罕的，如今已是家家戶戶都能見到的電器產品了。,"【解答：1】【ありふれる】普遍、平常、平凡 【穏やかな】(おだやかな)平穩的、溫和的 ◆穏やかな人 平穩的人 【懐かしい】(なつかしい)懷念的 ◆懐かしい曲 懷念的歌曲 【ふさわしい】合適的、相稱的 ◆パーティーにふさわしい服 適合派對的服裝"
90,1,6,ぶんぽう,彼女は、親の愛情＿＿＿＿幸せに育った。,をこめて,のもとで,をとわず,のたびに,2,她在父母的關愛下幸福地長大。,"【解答：2】【Nのもとで】在N之下 ◆この建物は、厳しい条件のもとで建てられた。這個建築物在嚴苛的條件下建造。【Nをこめて】傾注N、集中N *N = 「愛、気持ち、心、祈り、願い、思い、恨み」等 ◆親が愛情をこめて子を育てる。父母傾注愛養育小孩。"
91,1,7,もじ,彼は違反を認めた。,まとめた,みとめた,-,-,2,-,"91 【額】ガク：金額 金額・額 額度、數量、匾額、畫框 ひたい：額 額頭 【認】ニン：確認する 確認 みと(-める)：認める 認識、認定、認同 【署】ショ：署名 簽名・消防署 消防署・警察署 警察署・税務署 稅務署 【著】チョ：著者 著作者・著名な 著名的 あらわ(-す)：著す 著作出版 いちじる(-しい)：著しい 顯著的"`;

    // --- 強健的 CSV 解析器 (PapaParse 邏輯) ---
    const parseCSV = (str) => {
      const arr = [];
      let quote = false;
      let row = 0, col = 0;
      for (let c = 0; c < str.length; c++) {
        let cc = str[c], nc = str[c + 1];
        arr[row] = arr[row] || [];
        arr[row][col] = arr[row][col] || '';
        
        if (cc === '"' && quote && nc === '"') {
          arr[row][col] += cc; ++c; continue;
        }
        if (cc === '"') { quote = !quote; continue; }
        if (cc === ',' && !quote) { ++col; continue; }
        if (cc === '\n' && !quote) { ++row; col = 0; continue; }
        if (cc === '\r' && !quote) { continue; } // Ignore \r
        
        arr[row][col] += cc;
      }
      return arr;
    };

    // 將二維陣列轉換為物件陣列
    const processData = (csvString) => {
      const rows = parseCSV(csvString.trim());
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, i) => {
          obj[header] = row[i] ? row[i].trim() : '';
        });
        // 型別轉換確保後續比對正確
        obj.id = String(obj.id);
        obj.week = Number(obj.week);
        obj.day = Number(obj.day);
        obj.answer = String(obj.answer);
        return obj;
      });
    };

    const THEME_COLORS = {
      bg: 'bg-[#F5F5DC]', // 淡米色
      primary: 'bg-[#5F9EA0]', // 柔和藍綠色
      primaryHover: 'hover:bg-[#4F8E90]',
      textMain: 'text-gray-800',
      textMuted: 'text-gray-500',
      card: 'bg-[#FAFAF5]',
    };

    function App() {
      const [questions, setQuestions] = useState([]);
      const [currentWeek, setCurrentWeek] = useState(1);
      const [currentDay, setCurrentDay] = useState(1);
      const [currentType, setCurrentType] = useState('全部');
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({});
      const [showExplanation, setShowExplanation] = useState(false);
      const [showReport, setShowReport] = useState(false);
      const [isDataLoaded, setIsDataLoaded] = useState(false);

      // 初始化資料與讀取 localStorage
      useEffect(() => {
        const parsed = processData(rawCSVData);
        setQuestions(parsed);

        try {
          const savedAnswers = localStorage.getItem('jlptN2Answers');
          const savedWeek = localStorage.getItem('jlptN2Week');
          const savedDay = localStorage.getItem('jlptN2Day');

          if (savedAnswers) setUserAnswers(JSON.parse(savedAnswers));
          if (savedWeek) setCurrentWeek(Number(savedWeek));
          if (savedDay) setCurrentDay(Number(savedDay));
        } catch (e) {
          console.error("Failed to load from local storage", e);
        }
        setIsDataLoaded(true);
      }, []);

      // 儲存狀態至 localStorage
      useEffect(() => {
        if (isDataLoaded) {
          localStorage.setItem('jlptN2Answers', JSON.stringify(userAnswers));
          localStorage.setItem('jlptN2Week', currentWeek);
          localStorage.setItem('jlptN2Day', currentDay);
        }
      }, [userAnswers, currentWeek, currentDay, isDataLoaded]);

      // 重置視圖狀態
      useEffect(() => {
        setCurrentIndex(0);
        setShowExplanation(false);
        setShowReport(false);
      }, [currentWeek, currentDay, currentType]);

      // 過濾當前題目
      const filteredQuestions = useMemo(() => {
        return questions.filter(q => {
          const matchWeekAndDay = q.week === currentWeek && q.day === currentDay;
          const matchType = currentType === '全部' || q.type === currentType;
          return matchWeekAndDay && matchType;
        });
      }, [questions, currentWeek, currentDay, currentType]);

      // 進度計算
      const progressStats = useMemo(() => {
        const total = filteredQuestions.length;
        const completed = filteredQuestions.filter(q => userAnswers[q.id]).length;
        const isComplete = total > 0 && completed === total;
        return { total, completed, isComplete, percentage: total ? (completed / total) * 100 : 0 };
      }, [filteredQuestions, userAnswers]);

      // 錯題計算 (針對當前日期的所有題目，不受題型標籤影響)
      const currentDayMistakes = useMemo(() => {
        return questions.filter(q => 
          q.week === currentWeek && 
          q.day === currentDay && 
          userAnswers[q.id] && 
          userAnswers[q.id] !== q.answer
        );
      }, [questions, currentWeek, currentDay, userAnswers]);

      const currentQ = filteredQuestions[currentIndex];
      const hasAnsweredCurrent = currentQ ? !!userAnswers[currentQ.id] : false;

      const handleOptionClick = (optNum) => {
        if (hasAnsweredCurrent) return; // 已作答不可改
        setUserAnswers(prev => ({
          ...prev,
          [currentQ.id]: String(optNum)
        }));
      };

      const nextQuestion = () => {
        if (currentIndex < filteredQuestions.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setShowExplanation(false);
        }
      };

      const prevQuestion = () => {
        if (currentIndex > 0) {
          setCurrentIndex(prev => prev - 1);
          setShowExplanation(false);
        }
      };

      if (!isDataLoaded) return null;

      return (
        <div className={`min-h-screen ${THEME_COLORS.textMain} font-sans pb-12`}>
          {/* 頭部選單 */}
          <header className="bg-white shadow-sm sticky top-0 z-10">
            <div className="max-w-3xl mx-auto px-4 py-4 sm:px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
              <h1 className="text-xl font-bold flex items-center gap-2">
                <Icons.BookOpen className={`w-6 h-6 text-[#5F9EA0]`} />
                <span>N2 每日刷題計畫</span>
              </h1>
              
              <div className="flex gap-4">
                <select 
                  value={currentWeek} 
                  onChange={(e) => setCurrentWeek(Number(e.target.value))}
                  className="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-[#5F9EA0] focus:border-[#5F9EA0] block p-2"
                >
                  {[1, 2, 3, 4].map(w => <option key={w} value={w}>第 {w} 週</option>)}
                </select>
                <select 
                  value={currentDay} 
                  onChange={(e) => setCurrentDay(Number(e.target.value))}
                  className="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-[#5F9EA0] focus:border-[#5F9EA0] block p-2"
                >
                  {[1, 2, 3, 4, 5, 6, 7].map(d => <option key={d} value={d}>第 {d} 天</option>)}
                </select>
              </div>
            </div>
          </header>

          <main className="max-w-3xl mx-auto px-4 py-6 sm:px-6">
            
            {/* 進度條 */}
            <div className="mb-6">
              <div className="flex justify-between text-sm mb-1 font-medium">
                <span className={THEME_COLORS.textMuted}>今日進度 ({currentType})</span>
                <span>{progressStats.completed} / {progressStats.total}</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-2.5">
                <div 
                  className="bg-[#5F9EA0] h-2.5 rounded-full transition-all duration-500 ease-out" 
                  style={{ width: `${progressStats.percentage}%` }}
                ></div>
              </div>
            </div>

            {/* 題型頁籤 */}
            <div className="flex flex-wrap gap-2 mb-6">
              {['全部', 'もじ', 'ごい', 'ぶんぽう'].map(t => (
                <button
                  key={t}
                  onClick={() => setCurrentType(t)}
                  className={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${
                    currentType === t 
                      ? `${THEME_COLORS.primary} text-white shadow-sm` 
                      : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'
                  }`}
                >
                  {t}
                </button>
              ))}
            </div>

            {showReport ? (
              /* --- 錯題報告視圖 --- */
              <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-bold flex items-center gap-2">
                    <Icons.AlertTriangle className="text-orange-500 w-6 h-6" />
                    今日錯題回顧
                  </h2>
                  <button 
                    onClick={() => setShowReport(false)}
                    className="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1"
                  >
                    <Icons.RotateCcw className="w-4 h-4" /> 返回刷題
                  </button>
                </div>

                {currentDayMistakes.length === 0 ? (
                  <div className={`${THEME_COLORS.card} rounded-2xl p-8 text-center shadow-sm border border-gray-100`}>
                    <Icons.Trophy className="w-16 h-16 text-yellow-500 mx-auto mb-4" />
                    <h3 className="text-xl font-bold mb-2">太棒了！</h3>
                    <p className={THEME_COLORS.textMuted}>今天沒有任何錯題，完美過關！</p>
                  </div>
                ) : (
                  <div className="space-y-6">
                    {currentDayMistakes.map((mq, idx) => (
                      <div key={mq.id} className={`${THEME_COLORS.card} rounded-2xl p-6 shadow-sm border border-red-100`}>
                        <div className="flex gap-3 mb-4">
                          <span className="bg-red-100 text-red-700 font-bold px-3 py-1 rounded-full text-sm shrink-0 h-fit">
                            錯題 {idx + 1}
                          </span>
                          <p className="text-lg font-medium">{mq.question}</p>
                        </div>
                        
                        <div className="bg-green-50 border border-green-200 rounded-xl p-4 mb-4">
                          <p className="text-sm font-bold text-green-800 mb-1">正確答案：</p>
                          <p className="text-green-900">{mq[`opt${mq.answer}`]}</p>
                        </div>

                        <div className="bg-white border border-gray-200 rounded-xl p-4 space-y-3">
                          <div>
                            <span className="text-xs font-bold text-gray-400 uppercase tracking-wider">翻譯</span>
                            <p className="text-gray-700 mt-1">{mq.translation}</p>
                          </div>
                          <div className="h-px bg-gray-100 w-full my-2"></div>
                          <div>
                            <span className="text-xs font-bold text-gray-400 uppercase tracking-wider">詳解</span>
                            <p className="text-gray-700 mt-1 leading-relaxed whitespace-pre-wrap">{mq.explanation}</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

            ) : progressStats.isComplete ? (
              /* --- 完成慶祝視圖 --- */
              <div className={`${THEME_COLORS.card} rounded-3xl p-8 sm:p-12 text-center shadow-lg border border-gray-100 animate-in zoom-in-95 duration-500`}>
                <div className="inline-flex items-center justify-center w-24 h-24 bg-green-100 rounded-full mb-6">
                  <Icons.CheckCircle2 className="w-12 h-12 text-green-500" />
                </div>
                <h2 className="text-3xl font-bold mb-4 text-gray-800">完成今日任務！</h2>
                <p className={`${THEME_COLORS.textMuted} mb-8 text-lg`}>
                  你已經完成了本類別的所有題目。保持節奏，繼續加油！
                </p>
                
                <button
                  onClick={() => setShowReport(true)}
                  className={`w-full sm:w-auto px-8 py-4 ${THEME_COLORS.primary} ${THEME_COLORS.primaryHover} text-white rounded-xl font-bold text-lg transition-colors shadow-md flex items-center justify-center gap-2 mx-auto`}
                >
                  <Icons.AlertTriangle className="w-5 h-5" />
                  生成今日錯題報告
                </button>
              </div>

            ) : filteredQuestions.length === 0 ? (
              /* --- 空白視圖 --- */
              <div className={`${THEME_COLORS.card} rounded-3xl p-12 text-center shadow-sm`}>
                <p className={THEME_COLORS.textMuted}>本日無此題型資料。</p>
              </div>
            ) : (
              /* --- 刷題主視圖 --- */
              <div className={`${THEME_COLORS.card} rounded-3xl p-6 sm:p-8 shadow-sm border border-gray-100 animate-in fade-in duration-300`}>
                {/* 題目區 */}
                <div className="mb-8">
                  <div className="flex justify-between items-start mb-4">
                    <span className="bg-[#5F9EA0]/10 text-[#5F9EA0] px-3 py-1 rounded-full text-sm font-bold">
                      Q {currentIndex + 1} / {filteredQuestions.length}
                    </span>
                    <span className="text-sm text-gray-400">{currentQ.type}</span>
                  </div>
                  <h2 className="text-xl sm:text-2xl font-medium leading-relaxed">
                    {currentQ.question}
                  </h2>
                </div>

                {/* 選項區 */}
                <div className="space-y-3 mb-8">
                  {[1, 2, 3, 4].map(optNum => {
                    const optKey = `opt${optNum}`;
                    const optText = currentQ[optKey];
                    
                    // 隱藏內容為 '-' 的選項
                    if (!optText || optText === '-') return null;

                    const isSelected = userAnswers[currentQ.id] === String(optNum);
                    const isCorrectAns = currentQ.answer === String(optNum);
                    
                    let btnStyle = "bg-white border-gray-200 text-gray-700 hover:border-[#5F9EA0] hover:bg-teal-50/30";
                    let icon = null;

                    if (hasAnsweredCurrent) {
                      if (isCorrectAns) {
                        btnStyle = "bg-green-50 border-green-500 text-green-800 shadow-sm";
                        icon = <Icons.CheckCircle2 className="w-5 h-5 text-green-500 shrink-0" />;
                      } else if (isSelected) {
                        btnStyle = "bg-red-50 border-red-500 text-red-800";
                        icon = <Icons.XCircle className="w-5 h-5 text-red-500 shrink-0" />;
                      } else {
                        btnStyle = "bg-gray-50 border-gray-200 text-gray-400 opacity-60"; // 淡化其他選項
                      }
                    }

                    return (
                      <button
                        key={optNum}
                        onClick={() => handleOptionClick(optNum)}
                        disabled={hasAnsweredCurrent}
                        className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center justify-between group ${btnStyle}`}
                      >
                        <div className="flex items-center gap-4">
                          <span className={`w-8 h-8 flex items-center justify-center rounded-lg text-sm font-bold ${hasAnsweredCurrent ? 'bg-transparent' : 'bg-gray-100 group-hover:bg-[#5F9EA0]/10 text-gray-500 group-hover:text-[#5F9EA0]'}`}>
                            {optNum}
                          </span>
                          <span className="text-lg">{optText}</span>
                        </div>
                        {icon}
                      </button>
                    );
                  })}
                </div>

                {/* 控制區 */}
                <div className="flex flex-wrap sm:flex-nowrap items-center justify-between gap-4 pt-4 border-t border-gray-100">
                  <button 
                    onClick={prevQuestion}
                    disabled={currentIndex === 0}
                    className="p-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2 flex-1 sm:flex-none justify-center"
                  >
                    <Icons.ChevronLeft className="w-5 h-5" />
                    <span className="hidden sm:inline">上一題</span>
                  </button>

                  <button
                    onClick={() => setShowExplanation(!showExplanation)}
                    disabled={!hasAnsweredCurrent}
                    className={`px-6 py-3 rounded-xl font-bold transition-colors flex-grow sm:flex-grow-0
                      ${hasAnsweredCurrent 
                        ? (showExplanation ? 'bg-gray-200 text-gray-700' : 'bg-[#5F9EA0]/10 text-[#5F9EA0] hover:bg-[#5F9EA0]/20') 
                        : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                      }`}
                  >
                    {showExplanation ? '隱藏詳解' : '查看詳解'}
                  </button>

                  <button 
                    onClick={nextQuestion}
                    disabled={currentIndex === filteredQuestions.length - 1}
                    className="p-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2 flex-1 sm:flex-none justify-center"
                  >
                    <span className="hidden sm:inline">下一題</span>
                    <Icons.ChevronRight className="w-5 h-5" />
                  </button>
                </div>

                {/* 詳解區 */}
                {showExplanation && (
                  <div className="mt-6 p-5 bg-[#F8FAFC] border border-blue-100 rounded-2xl animate-in slide-in-from-top-2">
                    <div className="mb-4">
                      <h4 className="text-sm font-bold text-gray-400 mb-1 flex items-center gap-2">
                        <span className="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                        題目中譯
                      </h4>
                      <p className="text-gray-700">{currentQ.translation}</p>
                    </div>
                    <div className="h-px bg-blue-50 w-full my-3"></div>
                    <div>
                      <h4 className="text-sm font-bold text-gray-400 mb-1 flex items-center gap-2">
                        <span className="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                        詳細解析
                      </h4>
                      <p className="text-gray-700 leading-relaxed whitespace-pre-wrap">{currentQ.explanation}</p>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
